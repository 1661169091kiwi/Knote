# Pushing a tag like v1.0.0 builds the Windows installer on a GitHub runner
# and publishes it as a Release — no local upload, no local tokens.
name: Release Windows installer

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  issues: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Capacitor CLI 8 hard-requires NodeJS >=22
          node-version: 22
          cache: npm
      # Capacitor 8 gradle files target Java 21 — the runner just uses 21
      # (locally scripts/fix-android-java.mjs downgrades to the machine's 17)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npx vite build
      # the native android project is not committed — generate it fresh
      - shell: bash
        run: |
          set -o pipefail
          npx cap add android 2>&1 | tee cap.log
          npx cap sync android 2>&1 | tee -a cap.log
      - shell: bash
        run: |
          set -o pipefail
          cd android && chmod +x gradlew && ./gradlew assembleDebug 2>&1 | tee ../gradle.log | tail -100
      - run: cp android/app/build/outputs/apk/debug/app-debug.apk "Knote-${GITHUB_REF_NAME}-android.apk"
      - uses: softprops/action-gh-release@v2
        with:
          files: Knote-*-android.apk
      # logs are unreadable from outside without auth — surface failures as
      # an issue for remote diagnosis (mirrors the windows job)
      - if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { tail -c 5000 cap.log 2>/dev/null; echo; tail -c 5000 gradle.log 2>/dev/null; } > diag.txt || true
          gh issue create --title "CI android build failure (run $GITHUB_RUN_ID)" --body "$(printf '\x60\x60\x60\n%s\n\x60\x60\x60' "$(cat diag.txt)")"

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # package.json pins electronDist to node_modules/electron/dist (local
      # proxies truncate electron-builder's own zip download); guarantee that
      # folder exists on the runner by (re)running electron's install script
      - run: node node_modules/electron/install.js
      - run: npx vite build
      # --publish never: on a tagged CI build electron-builder defaults to
      # auto-publishing and dies without a token — the release step below
      # owns publishing instead
      - shell: pwsh
        run: |
          npx electron-builder --win --publish never *>&1 | Tee-Object build.log
          exit $LASTEXITCODE
      # log tails are unreadable without auth from outside — surface the
      # failure as an issue so it can be diagnosed remotely
      - if: failure()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tail = if (Test-Path build.log) { (Get-Content build.log -Tail 150) -join "`n" } else { 'no build.log' }
          gh issue create --title "CI release build failure (run $env:GITHUB_RUN_ID)" --body "``````
          $tail
          ``````"
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
