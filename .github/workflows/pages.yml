# Deploys the web build to GitHub Pages on every push to main, via the
# gh-pages BRANCH: pushing that branch auto-activates Pages on public repos,
# so no Settings step and no administration-scope token is needed (the
# official configure-pages "enablement" path requires admin rights the
# workflow GITHUB_TOKEN doesn't have).
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # the desktop build needs relative asset paths (base './'); the Pages
      # demo lives under /Knote/ — override per-build instead of in config
      - run: npx vite build --base=/Knote/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
