    // and plain-http LAN hosts don't support service workers anyway
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {})
      })
    }
